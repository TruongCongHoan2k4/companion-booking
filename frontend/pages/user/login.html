<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập - Companion Rental</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../../public/css/user.css" />
</head>

<body data-page="login" class="bg-light">
  <main class="container py-5 d-flex align-items-center justify-content-center" style="min-height: 100vh">
    <div class="card auth-card mx-auto user-card w-100">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
            style="width: 56px; height: 56px; background: linear-gradient(135deg, #3b82f6, #6366f1)">
            <i class="bi bi-person-fill text-white" style="font-size: 1.5rem"></i>
          </div>
          <h1 class="h4 fw-bold mb-1">Chào mừng trở lại</h1>
          <p class="text-muted small">Đăng nhập để tiếp tục sử dụng dịch vụ</p>
          <div class="mt-3">
            <a href="/pages/user/index.html" class="btn btn-outline-secondary btn-sm">
              <i class="bi bi-house-door me-1"></i>
              Về trang chủ
            </a>
          </div>
        </div>
        <div id="auth-message" class="mb-3"></div>
        <form id="login-form" class="row g-3" onsubmit="return AuthLogic.onLoginSubmit(event)">
          <div class="col-12">
            <label for="username" class="form-label">
              <i class="bi bi-person me-1"></i>
              Tên đăng nhập
            </label>
            <input type="text" id="username" name="username" class="form-control" data-testid="login-username"
              placeholder="Nhập tên đăng nhập" required />
          </div>
          <div class="col-12">
            <label for="password" class="form-label">
              <i class="bi bi-lock me-1"></i>
              Mật khẩu
            </label>
            <div class="input-group">
              <input type="password" id="password" name="password" class="form-control" data-testid="login-password"
                placeholder="Nhập mật khẩu" required />
              <button type="button" class="btn password-toggle-btn" id="toggle-password" aria-label="Hiện mật khẩu"
                title="Hiện mật khẩu">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>
          <div class="col-12 d-grid mt-4">
            <button type="submit" class="btn btn-primary btn-lg" data-testid="login-submit">
              <i class="bi bi-box-arrow-in-right me-2"></i>
              Đăng nhập
            </button>
          </div>
        </form>
        <p class="mt-4 mb-0 text-muted text-center">
          Chưa có tài khoản?
          <a href="../user/register.html" class="fw-semibold text-decoration-none">Đăng ký ngay</a>
        </p>
        <p class="mt-2 mb-0 text-center">
          <a href="./forgot-password.html" class="text-decoration-none small">Quên mật khẩu?</a>
        </p>
      </div>
    </div>
  </main>
  <script src="../../public/js/auth-logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (window.AuthLogic && AuthLogic.initRegisteredBanner) AuthLogic.initRegisteredBanner();

      const passwordInput = document.getElementById('password');
      const toggleBtn = document.getElementById('toggle-password');

      if (passwordInput && toggleBtn) {
        toggleBtn.addEventListener('click', function () {
          const isHidden = passwordInput.type === 'password';
          passwordInput.type = isHidden ? 'text' : 'password';

          const icon = toggleBtn.querySelector('i');
          if (icon) icon.className = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';

          const label = isHidden ? 'Ẩn mật khẩu' : 'Hiện mật khẩu';
          toggleBtn.setAttribute('aria-label', label);
          toggleBtn.setAttribute('title', label);
        });
      }
    });
  </script>
</body>

</html>
