<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trang chủ - Companion Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="../../public/css/user.css" />
  </head>
  <body data-page="index" class="bg-light">
    <nav class="navbar navbar-expand-lg bg-white border-bottom">
      <div class="container">
        <a class="navbar-brand fw-bold" href="../user/index.html">
          <i class="bi bi-heart-pulse-fill me-2"></i>
          Companion Rental
        </a>
        <div id="top-nav" class="app-nav d-flex align-items-center flex-wrap gap-1"></div>
      </div>
    </nav>
    <main class="container py-4">
      <section
        class="user-hero p-4 p-md-5 mb-4 text-white position-relative overflow-hidden"
        style="
          background-image: url('../../public/img/stt-du-lich-hai-huoc%20(1).jpg');
          background-size: cover;
          background-position: center;
          border-radius: 1rem;
        "
      >
        <div
          class="position-absolute top-0 start-0 w-100 h-100"
          style="background: linear-gradient(90deg, rgba(15, 23, 42, 0.72), rgba(15, 23, 42, 0.28))"
        ></div>
        <div class="position-relative">
        <h1 class="display-6 mb-2 fw-bold">
          <i class="bi bi-stars me-2"></i>
          Khu vực khách hàng
        </h1>
        <p class="lead mb-0 opacity-90">Tìm companion, đặt lịch, theo dõi lịch hẹn, đánh giá và báo cáo nhanh.</p>
        <div class="mt-3 d-flex flex-wrap gap-2">
          <a class="btn btn-warning fw-semibold" href="../companion/register.html" data-testid="become-companion-btn">
            <i class="bi bi-person-badge me-1"></i>
            Trở thành companion
          </a>
        </div>
        </div>
      </section>
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h4 mb-0 fw-bold">
          <i class="bi bi-fire text-danger me-2"></i>
          Companion nổi bật
        </h2>
        <a class="btn btn-outline-primary btn-sm" href="../user/search.html">
          <i class="bi bi-search me-1"></i>
          Xem tất cả
        </a>
      </div>
      <div
        id="companion-grid"
        data-testid="companion-grid"
        class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3"
      ></div>
    </main>
    <script src="../../public/js/realtime-stomp.js"></script>
    <script src="../../public/js/user.js"></script>
  </body>
</html>
