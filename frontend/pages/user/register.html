<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng ký - Companion Rental</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../../public/css/user.css" />
</head>

<body data-page="register" class="bg-light">
  <main class="container py-5 d-flex align-items-center justify-content-center" style="min-height: 100vh">
    <div class="card auth-card mx-auto user-card w-100">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
            style="width: 56px; height: 56px; background: linear-gradient(135deg, #10b981, #059669)">
            <i class="bi bi-person-plus-fill text-white" style="font-size: 1.5rem"></i>
          </div>
          <h1 class="h4 fw-bold mb-1">Tạo tài khoản mới</h1>
          <p class="text-muted small">Đăng ký miễn phí để bắt đầu sử dụng</p>
          <div class="mt-3">
            <a href="/pages/user/index.html" class="btn btn-outline-secondary btn-sm">
              <i class="bi bi-house-door me-1"></i>
              Về trang chủ
            </a>
          </div>
        </div>
        <div id="auth-message" class="mb-3"></div>
        <form id="register-form" class="row g-3">
          <div class="col-12">
            <label for="username" class="form-label">
              <i class="bi bi-person me-1"></i>
              Tên đăng nhập
            </label>
            <input type="text" id="username" name="username" class="form-control" placeholder="Chọn tên đăng nhập"
              required />
          </div>
          <div class="col-12">
            <label for="fullName" class="form-label">
              <i class="bi bi-card-text me-1"></i>
              Họ và tên
            </label>
            <input type="text" id="fullName" name="fullName" class="form-control" placeholder="Nhập họ và tên" />
          </div>
          <div class="col-12">
            <label for="phoneNumber" class="form-label">
              <i class="bi bi-telephone me-1"></i>
              Số điện thoại
            </label>
            <input type="tel" id="phoneNumber" name="phoneNumber" class="form-control" placeholder="Nhập số điện thoại" />
          </div>
          <div class="col-12">
            <label for="password" class="form-label">
              <i class="bi bi-lock me-1"></i>
              Mật khẩu
            </label>
            <div class="input-group">
              <input type="password" id="password" name="password" class="form-control" placeholder="Tối thiểu 8 ký tự"
                minlength="8" required />
              <button type="button" class="btn password-toggle-btn" id="toggle-password" aria-label="Hiện mật khẩu"
                title="Hiện mật khẩu">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>
          <div class="col-12">
            <label for="email" class="form-label">
              <i class="bi bi-envelope me-1"></i>
              Email
            </label>
            <input type="email" id="email" name="email" class="form-control" placeholder="email@example.com" required />
          </div>
          <div class="col-12 d-grid mt-4">
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="bi bi-check-circle me-2"></i>
              Đăng ký
            </button>
          </div>
        </form>
        <p class="mt-4 mb-0 text-muted text-center">
          Đã có tài khoản?
          <a href="../user/login.html" class="fw-semibold text-decoration-none">Đăng nhập ngay</a>
        </p>
      </div>
    </div>
  </main>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const passwordInput = document.getElementById('password');
      const toggleBtn = document.getElementById('toggle-password');

      if (passwordInput && toggleBtn) {
        toggleBtn.addEventListener('click', function () {
          const isHidden = passwordInput.type === 'password';
          passwordInput.type = isHidden ? 'text' : 'password';

          const icon = toggleBtn.querySelector('i');
          if (icon) icon.className = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';

          const label = isHidden ? 'Ẩn mật khẩu' : 'Hiện mật khẩu';
          toggleBtn.setAttribute('aria-label', label);
          toggleBtn.setAttribute('title', label);
        });
      }
    });
  </script>
  <script src="../../public/js/user.js"></script>
</body>

</html>
