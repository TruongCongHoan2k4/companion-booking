<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đặt lại mật khẩu - Companion Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="../../public/css/user.css" />
  </head>

  <body class="bg-light">
    <main class="container py-5 d-flex align-items-center justify-content-center" style="min-height: 100vh">
      <div class="card auth-card mx-auto user-card w-100">
        <div class="card-body p-4 p-md-5">
          <div class="text-center mb-4">
            <div
              class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
              style="width: 56px; height: 56px; background: linear-gradient(135deg, #3b82f6, #6366f1)"
            >
              <i class="bi bi-key-fill text-white" style="font-size: 1.5rem"></i>
            </div>
            <h1 class="h4 fw-bold mb-1">Đặt lại mật khẩu</h1>
            <p class="text-muted small mb-0">Nhập email, OTP 6 số và mật khẩu mới</p>
            <div class="mt-3">
              <a href="/pages/user/index.html" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-house-door me-1"></i>
                Về trang chủ
              </a>
            </div>
          </div>

          <div id="auth-message" class="mb-3"></div>

          <form id="reset-form" class="row g-3" onsubmit="return AuthLogic.onResetPasswordSubmit(event)">
            <div class="col-12">
              <label for="email" class="form-label">
                <i class="bi bi-envelope me-1"></i>
                Email
              </label>
              <input type="email" id="email" name="email" class="form-control" placeholder="email@example.com" required />
            </div>
            <div class="col-12">
              <label for="otp" class="form-label">
                <i class="bi bi-shield-check me-1"></i>
                OTP (6 số)
              </label>
              <input
                type="text"
                id="otp"
                name="otp"
                class="form-control"
                inputmode="numeric"
                pattern="[0-9]{6}"
                minlength="6"
                maxlength="6"
                placeholder="Ví dụ: 123456"
                required
              />
            </div>
            <div class="col-12">
              <label for="newPassword" class="form-label">
                <i class="bi bi-lock me-1"></i>
                Mật khẩu mới
              </label>
              <input
                type="password"
                id="newPassword"
                name="newPassword"
                class="form-control"
                minlength="8"
                maxlength="128"
                placeholder="Tối thiểu 8 ký tự"
                required
              />
            </div>
            <div class="col-12">
              <label for="confirmPassword" class="form-label">
                <i class="bi bi-lock-fill me-1"></i>
                Xác nhận mật khẩu mới
              </label>
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                class="form-control"
                minlength="8"
                maxlength="128"
                placeholder="Nhập lại mật khẩu"
                required
              />
            </div>
            <div class="col-12 d-grid mt-4">
              <button type="submit" class="btn btn-primary btn-lg" data-loading-text="Đang đặt lại...">
                <i class="bi bi-check2-circle me-2"></i>
                Đặt lại mật khẩu
              </button>
            </div>
          </form>

          <div class="d-flex justify-content-between mt-4">
            <a href="./forgot-password.html" class="text-decoration-none">
              <i class="bi bi-arrow-left me-1"></i>
              Gửi OTP lại
            </a>
            <a href="./login.html" class="text-decoration-none fw-semibold">Về đăng nhập</a>
          </div>
        </div>
      </div>
    </main>

    <script src="../../public/js/auth-logic.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const params = new URLSearchParams(window.location.search);
        const email = params.get('email');
        const emailInput = document.getElementById('email');
        if (email && emailInput) emailInput.value = email;

        const otpInput = document.getElementById('otp');
        if (otpInput) otpInput.addEventListener('input', () => (otpInput.value = otpInput.value.replace(/\D/g, '').slice(0, 6)));

        if (otpInput) otpInput.focus();
      });
    </script>
  </body>
</html>
