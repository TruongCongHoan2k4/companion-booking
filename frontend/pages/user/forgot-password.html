<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quên mật khẩu - Companion Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="../../public/css/user.css" />
  </head>

  <body class="bg-light">
    <main class="container py-5 d-flex align-items-center justify-content-center" style="min-height: 100vh">
      <div class="card auth-card mx-auto user-card w-100">
        <div class="card-body p-4 p-md-5">
          <div class="text-center mb-4">
            <div
              class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
              style="width: 56px; height: 56px; background: linear-gradient(135deg, #f59e0b, #f97316)"
            >
              <i class="bi bi-shield-lock-fill text-white" style="font-size: 1.5rem"></i>
            </div>
            <h1 class="h4 fw-bold mb-1">Quên mật khẩu</h1>
            <p class="text-muted small">Nhập email để nhận mã OTP 6 số</p>
            <div class="mt-3">
              <a href="/pages/user/index.html" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-house-door me-1"></i>
                Về trang chủ
              </a>
            </div>
          </div>

          <div id="auth-message" class="mb-3"></div>

          <div class="alert alert-info mb-3">
            <i class="bi bi-info-circle me-1"></i>
            Mã OTP sẽ được gửi qua email. Nếu bạn không thấy, hãy kiểm tra mục Spam/Quảng cáo.
          </div>

          <form id="forgot-form" class="row g-3" onsubmit="return AuthLogic.onForgotPasswordSubmit(event)">
            <div class="col-12">
              <label for="email" class="form-label">
                <i class="bi bi-envelope me-1"></i>
                Email đã đăng ký
              </label>
              <input
                type="email"
                id="email"
                name="email"
                class="form-control"
                placeholder="email@example.com"
                required
              />
              <div class="form-text">Nhập đúng email bạn dùng để đăng ký tài khoản.</div>
            </div>
            <div class="col-12 d-grid mt-4">
              <button type="submit" class="btn btn-warning btn-lg" data-loading-text="Đang gửi OTP...">
                <i class="bi bi-send me-2"></i>
                Gửi OTP
              </button>
            </div>
          </form>

          <div class="d-flex justify-content-between mt-4">
            <a href="./login.html" class="text-decoration-none">
              <i class="bi bi-arrow-left me-1"></i>
              Về đăng nhập
            </a>
            <a href="./reset-password.html" class="text-decoration-none fw-semibold">
              Nhập OTP để đặt lại
              <i class="bi bi-arrow-right ms-1"></i>
            </a>
          </div>
        </div>
      </div>
    </main>

    <script src="../../public/js/auth-logic.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const params = new URLSearchParams(window.location.search);
        const email = params.get('email');
        const input = document.getElementById('email');
        if (input) {
          if (email) input.value = email;
          input.focus();
        }
      });
    </script>
  </body>
</html>
