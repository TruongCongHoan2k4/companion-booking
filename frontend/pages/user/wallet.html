<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ví tiền - Companion Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="../../public/css/user.css" />
    <style>
      body[data-page='wallet'] {
        background-color: transparent !important;
        background-image: linear-gradient(rgba(248, 250, 252, 0.78), rgba(241, 245, 249, 0.72)),
          url('../../public/img/bg-user-wallet-unsplash.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        min-height: 100vh;
      }
    </style>
  </head>
  <body data-page="wallet" class="bg-light">
    <nav class="navbar navbar-expand-lg bg-white border-bottom">
      <div class="container">
        <a class="navbar-brand fw-bold" href="../user/index.html">
          <i class="bi bi-heart-pulse-fill me-2"></i>
          Companion Rental
        </a>
        <div id="top-nav" class="app-nav d-flex align-items-center flex-wrap gap-1"></div>
      </div>
    </nav>
    <main class="container py-4" data-testid="page-wallet-bookings">
      <div class="row g-3">
        <div class="col-lg-4">
          <div class="card user-card">
            <div class="card-body p-4">
              <div class="d-flex align-items-center gap-3 mb-3">
                <div
                  class="d-inline-flex align-items-center justify-content-center rounded-circle flex-shrink-0"
                  style="width: 48px; height: 48px; background: linear-gradient(135deg, #10b981, #059669)"
                >
                  <i class="bi bi-wallet2 text-white" style="font-size: 1.2rem"></i>
                </div>
                <div>
                  <h1 class="h5 mb-0 fw-bold">Số dư ví</h1>
                  <div id="wallet-balance" class="h4 text-primary fw-bold mb-0">0 VND</div>
                </div>
              </div>
              <hr />
              <h6 class="fw-bold mb-3">
                <i class="bi bi-plus-circle me-1"></i>
                Nạp tiền
              </h6>
              <form id="deposit-form" class="row g-2">
                <div class="col-12">
                  <label class="form-label" for="depositAmount">Số tiền nạp</label>
                  <input
                    id="depositAmount"
                    class="form-control"
                    type="number"
                    min="1000"
                    step="1000"
                    placeholder="Nhập số tiền"
                    required
                  />
                </div>
                <div class="col-12">
                  <label class="form-label" for="provider">Kênh nạp</label>
                  <select id="provider" class="form-select">
                    <option value="MOMO">MoMo</option>
                    <option value="VNPAY">VNPay</option>
                    <option value="BANK_TRANSFER">Chuyển khoản</option>
                  </select>
                </div>
                <div class="col-12 d-grid mt-2">
                  <button class="btn btn-primary" type="submit">
                    <i class="bi bi-cash-coin me-1"></i>
                    Nạp tiền
                  </button>
                </div>
              </form>
              <div id="wallet-message" class="mt-3"></div>

              <hr class="my-4" />

              <h6 class="fw-bold mb-3">
                <i class="bi bi-box-arrow-up-right me-1"></i>
                Rút tiền
              </h6>
              <form id="withdraw-form" class="row g-2">
                <div class="col-12">
                  <div id="withdraw-bank-summary" class="d-none border rounded p-2 bg-white">
                    <div class="d-flex align-items-start justify-content-between gap-2">
                      <div class="small">
                        <div class="fw-semibold">
                          <i class="bi bi-bank2 me-1"></i>
                          Tài khoản nhận tiền
                        </div>
                        <div id="withdraw-bank-summary-text" class="text-muted" style="white-space: pre-wrap"></div>
                      </div>
                      <button id="withdraw-bank-edit-btn" type="button" class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-pencil-square me-1"></i>
                        Sửa
                      </button>
                    </div>
                  </div>
                </div>
                <div class="col-12">
                  <label class="form-label" for="withdrawAmount">Số tiền rút</label>
                  <input
                    id="withdrawAmount"
                    class="form-control"
                    type="number"
                    min="1000"
                    step="1000"
                    placeholder="Nhập số tiền"
                    required
                  />
                </div>
                <div id="withdraw-bank-fields" class="col-12">
                  <div class="row g-2">
                    <div class="col-12">
                      <label class="form-label" for="withdrawBankName">Ngân hàng</label>
                      <input id="withdrawBankName" class="form-control" type="text" maxlength="100" required />
                    </div>
                    <div class="col-12">
                      <label class="form-label" for="withdrawBankAccountNumber">Số tài khoản</label>
                      <input id="withdrawBankAccountNumber" class="form-control" type="text" maxlength="30" required />
                    </div>
                    <div class="col-12">
                      <label class="form-label" for="withdrawAccountHolderName">Chủ tài khoản</label>
                      <input id="withdrawAccountHolderName" class="form-control" type="text" maxlength="100" required />
                    </div>
                  </div>
                </div>
                <div class="col-12 d-grid mt-2">
                  <button class="btn btn-outline-dark" type="submit">
                    <i class="bi bi-arrow-up-right-circle me-1"></i>
                    Tạo lệnh rút
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
        <div class="col-lg-8">
          <div class="card user-card">
            <div class="card-body p-4">
              <h2 class="h5 mb-3 fw-bold">
                <i class="bi bi-clock-history me-2"></i>
                Lịch sử giao dịch
              </h2>
              <div class="table-responsive">
                <table class="table table-sm align-middle">
                  <thead>
                    <tr>
                      <th>Thời gian</th>
                      <th>Loại</th>
                      <th>Kênh</th>
                      <th>Nội dung</th>
                      <th>Số tiền</th>
                    </tr>
                  </thead>
                  <tbody id="wallet-transactions"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Withdraw confirm modal -->
    <div class="modal fade" id="user-withdraw-confirm-modal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">
              <i class="bi bi-shield-check me-2"></i>
              Xác nhận rút tiền
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="mb-2 text-muted small">Vui lòng kiểm tra thông tin trước khi tạo lệnh rút.</div>
            <div class="border rounded p-3 bg-light">
              <div class="d-flex justify-content-between">
                <div class="text-muted">Số tiền</div>
                <div class="fw-bold" id="user-withdraw-confirm-amount">0 VND</div>
              </div>
              <hr class="my-2" />
              <div class="text-muted small" style="white-space: pre-wrap" id="user-withdraw-confirm-bank"></div>
            </div>
            <div class="alert alert-warning mt-3 mb-0 py-2 small">
              Số tiền sẽ bị trừ khỏi ví ngay và lệnh rút sẽ ở trạng thái chờ xử lý.
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Hủy</button>
            <button type="button" class="btn btn-dark" id="user-withdraw-confirm-submit-btn">
              <i class="bi bi-arrow-up-right-circle me-1"></i>
              Xác nhận tạo lệnh
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../public/js/realtime-stomp.js"></script>
    <script src="../../public/js/user.js"></script>
  </body>
</html>
