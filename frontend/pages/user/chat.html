<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat/Call - Companion Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="../../public/css/user.css" />
    <style>
      body {
        background:
          radial-gradient(1000px 500px at 20% 10%, rgba(99, 102, 241, 0.12), transparent 55%),
          radial-gradient(900px 520px at 80% 0%, rgba(59, 130, 246, 0.12), transparent 60%),
          linear-gradient(180deg, #f8fafc, #f1f5f9);
      }
      #chat-list {
        background:
          radial-gradient(12px 12px at 12px 12px, rgba(148, 163, 184, 0.22) 0 2px, transparent 3px) 0 0 / 28px 28px,
          linear-gradient(135deg, #f8fafc, #eef2ff);
      }
      #chat-thread-list .list-group-item-action {
        border-radius: 0;
        transition: all 0.15s ease;
      }
      #chat-thread-list .list-group-item-action:hover {
        background: linear-gradient(135deg, #eff6ff, #eef2ff);
      }
      #chat-thread-list .list-group-item-action.bg-light {
        background: linear-gradient(135deg, #eff6ff, #eef2ff) !important;
        border-left: 3px solid #3b82f6;
      }
      .chat-shell {
        border: 1px solid rgba(148, 163, 184, 0.35);
        box-shadow: 0 18px 60px rgba(15, 23, 42, 0.08);
        backdrop-filter: blur(8px);
      }

      /* Messenger-like bubbles */
      .cb-bubble {
        max-width: min(520px, 78%);
        padding: 10px 12px;
        border-radius: 18px;
        position: relative;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
        border: 1px solid rgba(148, 163, 184, 0.25);
      }
      .cb-bubble.cb-me {
        background: linear-gradient(135deg, #3b82f6, #6366f1);
        color: #fff;
        border-color: rgba(255, 255, 255, 0.18);
      }
      .cb-bubble.cb-them {
        background: rgba(255, 255, 255, 0.92);
        color: #0f172a;
      }
      .cb-bubble-text {
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.35;
      }
      .cb-bubble-meta {
        margin-top: 6px;
        font-size: 0.75rem;
        opacity: 0.85;
      }
      .cb-bubble.cb-me .cb-bubble-meta {
        color: rgba(255, 255, 255, 0.85);
      }

      /* Messenger-like composer */
      .cb-composer {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }
      .cb-composer .btn-icon {
        width: 38px;
        height: 38px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .cb-composer input {
        border: 0;
        outline: 0;
        box-shadow: none !important;
        background: transparent;
      }
      .cb-send {
        width: 42px;
        height: 42px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body data-page="chat" class="bg-light">
    <nav class="navbar navbar-expand-lg bg-white border-bottom">
      <div class="container">
        <a class="navbar-brand fw-bold" href="../user/index.html">
          <i class="bi bi-heart-pulse-fill me-2"></i>
          Companion Rental
        </a>
        <div id="top-nav" class="app-nav d-flex align-items-center flex-wrap gap-1"></div>
      </div>
    </nav>
    <main class="container py-4">
      <div class="card user-card chat-shell">
        <div class="card-body p-4">
          <div class="d-flex align-items-center gap-3 mb-4">
            <div
              class="d-inline-flex align-items-center justify-content-center rounded-circle flex-shrink-0"
              style="width: 48px; height: 48px; background: linear-gradient(135deg, #3b82f6, #6366f1)"
            >
              <i class="bi bi-chat-dots-fill text-white" style="font-size: 1.2rem"></i>
            </div>
            <div class="flex-grow-1">
              <h1 class="h4 mb-0 fw-bold">Tin nhắn</h1>
              <div id="chat-my-name" class="text-muted small mt-1"></div>
            </div>
          </div>
          <div class="row g-3">
            <div class="col-12">
              <div class="d-flex align-items-center justify-content-between mb-2">
                <div>
                  <div class="fw-semibold" id="chat-thread-title">Chưa chọn cuộc trò chuyện</div>
                  <div class="text-muted small d-none" id="chat-booking-id-row">
                    Booking ID:
                    <span id="chat-booking-id-text">-</span>
                  </div>
                </div>
                <div class="d-flex align-items-center gap-2">
                  <span class="text-muted small d-none d-md-inline">Đang chat với</span>
                  <select id="chat-booking-select" class="form-select form-select-sm" style="max-width: 260px"></select>
                </div>
              </div>
              <div id="chat-list" class="border rounded-3 p-3 mb-3" style="height: 380px; overflow: auto"></div>
              <form id="chat-form" class="cb-composer">
                <button type="button" class="btn btn-light btn-icon" title="Emoji (demo)">
                  <i class="bi bi-emoji-smile"></i>
                </button>
                <button type="button" class="btn btn-light btn-icon" title="Đính kèm (demo)">
                  <i class="bi bi-paperclip"></i>
                </button>
                <input
                  id="chat-content"
                  class="form-control"
                  placeholder="Chọn 1 cuộc trò chuyện để nhắn..."
                  autocomplete="off"
                  disabled
                />
                <button class="btn btn-primary cb-send" type="submit" title="Gửi">
                  <i class="bi bi-send-fill"></i>
                </button>
              </form>
            </div>
          </div>
          <div id="chat-message" class="mt-3"></div>
        </div>
      </div>
    </main>
    <script src="../../public/js/realtime-stomp.js"></script>
    <script src="../../public/js/user.js"></script>
  </body>
</html>
