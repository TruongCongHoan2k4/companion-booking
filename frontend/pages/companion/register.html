<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đăng ký Companion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="../../public/css/companion.css" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="../user/index.html">
          <i class="bi bi-heart-pulse-fill me-2"></i>
          Companion Rental
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#regNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="regNav">
          <div class="navbar-nav ms-auto">
            <a class="nav-link" href="../user/index.html">
              <i class="bi bi-search me-1"></i>
              Tìm kiếm
            </a>
            <a class="nav-link" href="../../policy.html">
              <i class="bi bi-file-earmark-text me-1"></i>
              Chính sách
            </a>
            <a class="nav-link" href="../companion/dashboard.html">
              <i class="bi bi-grid-1x2 me-1"></i>
              Dashboard
            </a>
            <a class="nav-link text-warning" href="#" id="logout-btn">
              <i class="bi bi-box-arrow-right me-1"></i>
              Đăng xuất
            </a>
          </div>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h1 class="h3 mb-1 fw-bold">
            <i class="bi bi-person-plus-fill me-2"></i>
            Đăng ký Companion
          </h1>
          <p class="text-muted mb-0">Hoàn tất hồ sơ để bắt đầu nhận booking</p>
        </div>
        <span id="auth-user" class="badge text-bg-primary"></span>
      </div>
      <div id="alert-box"></div>

      <section class="card shadow-sm" style="max-width: 800px">
        <div class="card-body p-4">
          <div class="d-flex align-items-center gap-3 mb-4">
            <div
              class="d-inline-flex align-items-center justify-content-center rounded-circle flex-shrink-0"
              style="width: 48px; height: 48px; background: linear-gradient(135deg, #8b5cf6, #a78bfa)"
            >
              <i class="bi bi-clipboard-check text-white" style="font-size: 1.2rem"></i>
            </div>
            <div>
              <h2 class="h5 mb-0 fw-bold" style="padding-left: 0">Thông tin hồ sơ</h2>
              <p class="text-muted small mb-0">Gửi yêu cầu duyệt Companion</p>
            </div>
          </div>
          <form id="register-form" class="row g-3 mt-1" enctype="multipart/form-data">
            <div class="col-12">
              <label for="bio" class="form-label">
                <i class="bi bi-person-lines-fill me-1"></i>
                Tiểu sử
              </label>
              <textarea
                id="bio"
                class="form-control"
                rows="3"
                placeholder="Giới thiệu về bản thân..."
                required
              ></textarea>
            </div>
            <div class="col-md-6">
              <label for="hobbies" class="form-label">
                <i class="bi bi-heart me-1"></i>
                Sở thích
              </label>
              <input id="hobbies" class="form-control" placeholder="Game, thể thao, du lịch..." required />
            </div>
            <div class="col-md-6">
              <label for="appearance" class="form-label">
                <i class="bi bi-emoji-smile me-1"></i>
                Ngoại hình
              </label>
              <input id="appearance" class="form-control" placeholder="Mô tả ngoại hình" required />
            </div>
            <div class="col-12">
              <label for="availability" class="form-label">
                <i class="bi bi-clock me-1"></i>
                Thông tin lịch rảnh tổng quan
              </label>
              <input id="availability" class="form-control" placeholder="VD: Tối 2-6, 18:00 - 22:00" />
            </div>
            <div class="col-md-6">
              <label for="serviceType" class="form-label">
                <i class="bi bi-tag me-1"></i>
                Loại dịch vụ
              </label>
              <input id="serviceType" class="form-control" placeholder="VD: Masseur / Stream / Chơi game..." />
            </div>
            <div class="col-md-6">
              <label for="area" class="form-label">
                <i class="bi bi-geo-alt me-1"></i>
                Khu vực thuê
              </label>
              <input id="area" class="form-control" placeholder="VD: TP.HCM, Quận 1; Hà Nội, Cầu Giấy" />
            </div>
            <div class="col-12">
              <label for="rentalVenues" class="form-label">
                <i class="bi bi-building me-1"></i>
                Danh sách nơi thuê (mỗi dòng một lựa chọn)
              </label>
              <textarea id="rentalVenues" class="form-control" rows="4" placeholder="Ví dụ:\nQuán cafe ABC\nCông viên XYZ"></textarea>
            </div>
            <div class="col-md-6">
              <label for="gender" class="form-label">
                <i class="bi bi-gender-ambiguous me-1"></i>
                Giới tính
              </label>
              <input id="gender" class="form-control" placeholder="VD: Nam/Nữ/Khác" />
            </div>
            <div class="col-md-6">
              <label for="gameRank" class="form-label">
                <i class="bi bi-controller me-1"></i>
                Game rank (nếu có)
              </label>
              <input id="gameRank" class="form-control" placeholder="VD: Diamond / Master..." />
            </div>
            <div class="col-md-6">
              <label for="identityNumber" class="form-label">
                <i class="bi bi-card-text me-1"></i>
                Số CCCD/CMND
              </label>
              <input id="identityNumber" class="form-control" />
            </div>
            <div class="col-md-6 form-check form-switch pt-4">
              <input class="form-check-input" type="checkbox" id="onlineStatus" />
              <label class="form-check-label fw-semibold" for="onlineStatus">
                <i class="bi bi-wifi me-1"></i>
                Bật trạng thái Online
              </label>
            </div>
            <div class="col-md-6">
              <label for="identityImage" class="form-label">
                <i class="bi bi-image me-1"></i>
                Ảnh CCCD/CMND
              </label>
              <input type="file" id="identityImage" class="form-control" accept="image/*" />
            </div>
            <div class="col-md-6">
              <label for="portraitImage" class="form-label">
                <i class="bi bi-camera me-1"></i>
                Ảnh chân dung
              </label>
              <input type="file" id="portraitImage" class="form-control" accept="image/*" />
            </div>
            <div class="col-12">
              <label for="introMedia" class="form-label">
                <i class="bi bi-collection me-1"></i>
                Album ảnh / video giới thiệu
              </label>
              <input type="file" id="introMedia" class="form-control" accept="image/*,video/*" multiple />
              <div class="form-text">Có thể chọn nhiều file.</div>
            </div>
            <div class="col-12">
              <label for="skills" class="form-label">
                <i class="bi bi-tools me-1"></i>
                Kỹ năng / Dịch vụ cung cấp
              </label>
              <textarea id="skills" class="form-control" rows="2" placeholder="VD: trò chuyện, chơi game, massage..."></textarea>
            </div>
            <div class="col-12 mt-3">
              <button class="btn btn-primary btn-lg" type="submit">
                <i class="bi bi-send me-2"></i>
                Gửi đăng ký
              </button>
            </div>
          </form>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../public/js/companion-register.js"></script>
  </body>
</html>
